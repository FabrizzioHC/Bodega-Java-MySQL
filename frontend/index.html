<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodega Fabri | Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="gestion-productos">

    <header class="text-center my-4">
        <h1 class="display-5 fw-bold">🏪 Bodega Fabri</h1>
        <p class="text-white">Sistema de Gestión de Inventario</p>
    </header>

    <main class="container-fluid px-4">
        <div class="row g-4">
            
            <!-- SECCIÓN 1: FORMULARIO -->
            <section class="col-12 col-lg-4">
                <div class="card p-4 h-100 shadow-sm">
                    <h2 class="h4 pb-2 mb-4 border-bottom text-title" id="form-title">Agregar Producto</h2>
                    <form id="producto-form">
                        <!-- ID Oculto -->
                        <input type="hidden" id="producto-id-db">

                        <div class="mb-3">
                            <label for="nombre" class="form-label text-muted-custom small">Nombre del Producto</label>
                            <input type="text" class="form-control form-control-custom" id="nombre" required placeholder="Ej. Inka Cola 3L">
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label for="cantidad" class="form-label text-muted-custom small">Cantidad</label>
                                <input type="number" class="form-control form-control-custom" id="cantidad" min="0" required placeholder="0">
                            </div>
                            <div class="col-6">
                                <label for="precio" class="form-label text-muted-custom small">Precio (S/.)</label>
                                <input type="number" class="form-control form-control-custom" id="precio" step="0.10" min="0" required placeholder="0.00">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="vencimiento" class="form-label text-muted-custom small">Fecha de Vencimiento</label>
                            <input type="date" class="form-control form-control-custom" id="vencimiento" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success fw-bold" id="btn-guardar">Guardar Producto</button>
                            <button type="button" class="btn btn-secondary fw-bold d-none" id="btn-cancelar">Cancelar</button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- SECCIÓN 2: TABLA DE INVENTARIO -->
            <section class="col-12 col-lg-8">
                <div class="card p-4 shadow-sm">
                    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
                        <h2 class="h4 mb-0 text-title">Inventario Actual</h2>
                        <div class="search-box">
                            <input type="text" class="form-control form-control-custom" id="buscar" placeholder="Buscar por nombre o ID...">
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-borderless align-middle custom-table mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Cantidad</th>
                                    <th>Precio</th>
                                    <th>Vencimiento</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-productos">
                                <!-- JavaScript -->
                                <tr>
                                    <td>1</td>
                                    <td class="fw-semibold">Inka Cola 3L</td>
                                    <td>10</td>
                                    <td>S/. 5.50</td>
                                    <td>2026-06-30</td>
                                    <td>
                                        <button class="btn btn-action-custom edit me-1">✏️</button>
                                        <button class="btn btn-action-custom delete">❌</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
            
        </div>
    </main>

    <!-- tarjeta Emergente pa editar productos -->
    <div id="modal-editar" class="modal-overlay d-none">
        <div class="card card-custom p-4 shadow-lg text-white style="max-width: 500px; margin: auto;">
            <h4 class="text-white mb-3">✏️ Editar Producto</h4>
            
            <form id="form-editar">
            <!-- ID Oculto -->
            <input type="hidden" id="edit-id" />

            <div class="mb-3">
                <label class="form-label">Nombre del Producto</label>
                <input type="text" id="edit-nombre" class="form-control" required />
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                <label class="form-label">Cantidad</label>
                <input type="number" id="edit-cantidad" class="form-control" required />
                </div>
                <div class="col-md-6 mb-3">
                <label class="form-label">Precio (S/.)</label>
                <input type="number" step="0.01" id="edit-precio" class="form-control" required />
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Fecha de Vencimiento</label>
                <input type="date" id="edit-vencimiento" class="form-control" required />
            </div>

            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-secondary" onclick="cerrarModalEditar()">Cancelar</button>
                <button type="submit" class="btn btn-warning">Actualizar</button>
            </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
