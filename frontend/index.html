<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodega Fabri | Panel de Control</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>🏪 Bodega Fabri</h1>
        <p>Sistema de Gestión de Inventario</p>
    </header>

    <main class="container">
        
        <!-- SECCIÓN 1: FORMULARIO -->
        <section class="card form-section">
            <h2 id="form-title">Agregar Producto</h2>
            <form id="producto-form">
                <!-- ID Oculto para cuando nos toque editar -->
                <input type="hidden" id="producto-id-db">

                <div class="input-group">
                    <label for="nombre">Nombre del Producto</label>
                    <input type="text" id="nombre" required placeholder="Ej. Inka Cola 3L">
                </div>

                <div class="row">
                    <div class="input-group">
                        <label for="cantidad">Cantidad</label>
                        <input type="number" id="cantidad" min="0" required placeholder="0">
                    </div>
                    <div class="input-group">
                        <label for="precio">Precio (S/.)</label>
                        <input type="number" id="precio" step="0.10" min="0" required placeholder="0.00">
                    </div>
                </div>

                <div class="input-group">
                    <label for="vencimiento">Fecha de Vencimiento</label>
                    <input type="date" id="vencimiento" required>
                </div>

                <button type="submit" class="btn btn-success" id="btn-guardar">Guardar Producto</button>
                <button type="button" class="btn btn-secondary hidden" id="btn-cancelar">Cancelar</button>
            </form>
        </section>

        <!-- SECCIÓN 2: TABLA DE INVENTARIO -->
        <section class="card table-section">
            <div class="table-header">
                <h2>Inventario Actual</h2>
                <div class="search-box">
                    <input type="text" id="buscar" placeholder="Buscar por nombre o ID...">
                </div>
            </div>

            <div class="responsive-table">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Cantidad</th>
                            <th>Precio</th>
                            <th>Vencimiento</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-productos">
                        <!-- Los productos de MySQL se pintarán aquí con JavaScript -->
                        <tr>
                            <td>1</td>
                            <td>Inka Cola 3L</td>
                            <td>10</td>
                            <td>S/. 5.50</td>
                            <td>2026-06-30</td>
                            <td>
                                <button class="btn-action edit">✏️</button>
                                <button class="btn-action delete">❌</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
